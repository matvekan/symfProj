networks:
  symfony_network:
    name: symfony_network

services:
  nginx:
    container_name: symfony_nginx
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www
    depends_on:
      - php
    networks:
      - symfony_network

  php:
    container_name: symfony_php
    build:
      context: ./docker/php
    volumes:
      - ./:/var/www
    environment:
      - DATABASE_URL=mysql://root:root@mysql:3306/symfony?serverVersion=8.0
    networks:
      - symfony_network
    depends_on:
      - mysql
      - redis

  mysql:
    container_name: symfony_mysql
    image: mysql:8.0
    volumes:
      - ./docker/mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=symfony
    ports:
      - "33306:3306"
    networks:
      - symfony_network

  redis:
    container_name: symfony_redis
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - symfony_network
