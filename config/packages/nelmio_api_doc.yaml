nelmio_api_doc:
  documentation:
    info:
      title: SymfProj API
      version: 1.0.0
      description: API documentation for SymfProj
    components:
      schemas:
        ErrorResponse:
          type: object
          properties:
            code:
              type: integer
              example: 401
            message:
              type: string
              example: Unauthorized.
        ValidationErrorResponse:
          type: object
          properties:
            message:
              type: string
              example: Validation failed
            errors:
              type: object
        Interest:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: programming
        User:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: John Doe
            email:
              type: string
              format: email
              example: john@example.com
            role:
              type: string
              enum: [ROLE_USER, ROLE_ADMIN]
              example: ROLE_USER
            createdAt:
              type: string
              format: date-time
              example: '2026-04-29T10:30:00+00:00'
            interests:
              type: array
              items:
                $ref: '#/components/schemas/Interest'
        UserList:
          type: array
          items:
            $ref: '#/components/schemas/User'
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
    security:
      - bearerAuth: []
    paths:
      /api/login_check:
        post:
          tags: [Auth]
          summary: User login (JWT)
          description: Authenticates user and returns JWT token.
          security: []
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                      example: admin@example.com
                    password:
                      type: string
                      example: admin123
          responses:
            '200':
              description: JWT token
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJ0eXAiOiJKV1QiLCJhbGciOi...
            '401':
              description: Invalid credentials
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'

      /api/auth/register:
        post:
          tags: [Auth]
          summary: Register user
          description: Creates a new user account.
          security: []
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [name, email, password]
                  properties:
                    name:
                      type: string
                      example: John Doe
                    email:
                      type: string
                      format: email
                      example: john@example.com
                    password:
                      type: string
                      example: strong-password-123
                    interestIds:
                      type: array
                      items:
                        type: integer
                      example: [1, 2]
          responses:
            '201':
              description: User created
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/User'
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'

      /api/auth/forgot-password:
        post:
          tags: [Auth]
          summary: Start password reset
          description: Stores reset token and enqueues email sending.
          security: []
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [email]
                  properties:
                    email:
                      type: string
                      format: email
                      example: admin@example.com
          responses:
            '200':
              description: Request accepted
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      message:
                        type: string
                        example: If this email exists, reset instructions were sent.
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'

      /api/auth/reset-password:
        post:
          tags: [Auth]
          summary: Complete password reset
          description: Resets password by token.
          security: []
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [token, newPassword]
                  properties:
                    token:
                      type: string
                      example: 36f8374e6a81...
                    newPassword:
                      type: string
                      example: new-strong-password-123
          responses:
            '200':
              description: Password changed
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Password has been reset successfully.
            '400':
              description: Invalid or expired token
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'

      /api/me:
        get:
          tags: [Me]
          summary: Get current user profile
          responses:
            '200':
              description: Current user data
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/User'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
        patch:
          tags: [Me]
          summary: Update current user profile
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/UpdateMeRequestDto'
          responses:
            '200':
              description: Updated user
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/User'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'

      /api/me/interests:
        put:
          tags: [Me]
          summary: Replace current user interests
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ReplaceMeInterestsRequestDto'
          responses:
            '200':
              description: Updated user with replaced interests
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/User'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'

      /api/interests:
        get:
          tags: [Interest]
          summary: List interests
          responses:
            '200':
              description: Interests list
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Interest'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'

      /api/admin/interests:
        get:
          tags: [Admin]
          summary: List all interests (admin)
          responses:
            '200':
              description: Interests list
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Interest'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '403':
              description: Forbidden for non-admin users
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
        post:
          tags: [Admin]
          summary: Create interest (admin)
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateAdminInterestRequestDto'
          responses:
            '201':
              description: Interest created
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Interest'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '403':
              description: Forbidden for non-admin users
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'

      /api/admin/users:
        get:
          tags: [Admin]
          summary: List users with filters (admin)
          parameters:
            - in: query
              name: name
              schema: { type: string }
            - in: query
              name: email
              schema: { type: string }
            - in: query
              name: role
              schema:
                type: string
                enum: [ROLE_USER, ROLE_ADMIN]
            - in: query
              name: createdFrom
              schema: { type: string, format: date-time }
            - in: query
              name: createdTo
              schema: { type: string, format: date-time }
            - in: query
              name: interestName
              schema: { type: string }
            - in: query
              name: interestIds[]
              schema:
                type: array
                items: { type: integer }
            - in: query
              name: page
              schema: { type: integer, default: 1 }
            - in: query
              name: limit
              schema: { type: integer, default: 20, maximum: 100 }
          responses:
            '200':
              description: Users list
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/UserList'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '403':
              description: Forbidden for non-admin users
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'

      /api/admin/users/{user}:
        get:
          tags: [Admin]
          summary: Get user by id (admin)
          parameters:
            - in: path
              name: user
              required: true
              schema: { type: integer }
          responses:
            '200':
              description: User details
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/User'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '403':
              description: Forbidden for non-admin users
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '404':
              description: User not found
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
        patch:
          tags: [Admin]
          summary: Update user by id (admin)
          parameters:
            - in: path
              name: user
              required: true
              schema: { type: integer }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/UpdateAdminUserRequestDto'
          responses:
            '200':
              description: Updated user
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/User'
            '401':
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '403':
              description: Forbidden for non-admin users
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '404':
              description: User not found
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
            '422':
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationErrorResponse'
  areas:
    default:
      path_patterns:
        - ^/api(?!/doc$)(?!/doc\.json$)
