nelmio_api_doc:
  documentation:
    info:
      title: SymfProj API
      version: 1.0.0
      description: API documentation for SymfProj
    components:
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
    security:
      - bearerAuth: []
    paths:
      /api/login_check:
        post:
          tags: [Auth]
          summary: User login (JWT)
          description: Authenticates user and returns JWT token.
          security: []
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                      example: admin@example.com
                    password:
                      type: string
                      example: admin123
          responses:
            '200':
              description: JWT token
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJ0eXAiOiJKV1QiLCJhbGciOi...
            '401':
              description: Invalid credentials
  areas:
    default:
      path_patterns:
        - ^/api(?!/doc$)(?!/doc\.json$)
